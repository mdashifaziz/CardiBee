name: cardibee_flutter
description: CardiBee — Bangladesh's first credit/debit card offer aggregator. Scout. Compare. Save.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Routing
  go_router: ^14.2.0

  # Networking
  dio: ^5.4.3+1

  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.3.1

  # Firebase
  firebase_core: ^3.3.0
  firebase_messaging: ^15.1.0

  # Localisation
  intl: ^0.20.2

  # Animation
  flutter_animate: ^4.5.0

  # Image caching
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/l10n/
    - lib/mock/fixtures/

  # fonts temporarily disabled for preview build — add font files to assets/fonts/ to re-enable
  # fonts:
  #   - family: DMSans ...
  #   - family: SpaceGrotesk ...
